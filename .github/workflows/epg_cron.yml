name: Generar EPG DSports Oficial

on:
  schedule:
    - cron: '0 6 * * *' # Todos los días a las 03:00 AM hora Argentina
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Extractor
      run: python actualizar_epg.py

    - name: Commit y Push del XML
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add epg-dsports.xml
        git commit -m "Auto-update DSports EPG" || exit 0
        git push
