name: Actualizar EPG DirecTV y DSports

on:
  schedule:
    # Se ejecuta todos los días a las 06:00 UTC (03:00 AM hora Argentina)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite ejecución manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Scraper
      run: python scraper.py

    - name: Commit y Push de archivos XML
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add epg-completa.xml epg-dsports.xml
        git commit -m "Auto-update EPGs" || exit 0
        git push
