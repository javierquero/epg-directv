name: Actualizar EPG DirecTV con Playwright

on:
  schedule:
    # Se ejecuta todos los días a las 06:00 UTC (03:00 AM Argentina)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias de Python
      run: |
        python -m pip install --upgrade pip
        pip install playwright

    - name: Instalar navegadores y dependencias del sistema para Playwright
      run: |
        python -m playwright install chromium
        python -m playwright install-deps chromium

    - name: Ejecutar Scraper
      run: python scraper.py

    - name: Commit y Push de archivos XML
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add epg-completa.xml epg-dsports.xml respuesta_capturada.json || exit 0
        git commit -m "Auto-update EPGs via Playwright" || exit 0
        git push
